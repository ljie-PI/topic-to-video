<!doctype html>
<!--
  HyperFrames composition skeleton for Chinese narrated video.
  Adapt this template per project. Dawn is the default visual style.
  For Rose Pine Moon Serious, replace palette/font tokens from templates/design-moon.md.

  Key conventions baked in:
  - #root selector instead of [data-composition-id="..."]  (avoids self-attribute lint)
  - class="clip" on every visible timed element
  - Single audio element on a high track (track-index 9)
  - All timing comes from scene-timing.json (6-decimal precision)
  - GSAP timeline registered synchronously
-->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- TODO: set width × height to match orientation -->
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* === Fonts (downloaded via fonts-download.sh) === */
      @font-face { font-family: 'MaShanZheng'; src: url('fonts/ma-shan-zheng.woff2') format('woff2'); font-display: block; }
      @font-face { font-family: 'LongCang';    src: url('fonts/long-cang.woff2')     format('woff2'); font-display: block; }
      @font-face { font-family: 'Caveat';      src: url('fonts/caveat-700.woff2')    format('woff2'); font-weight: 700; font-display: block; }
      @font-face { font-family: 'PatrickHand'; src: url('fonts/patrick-hand.woff2')  format('woff2'); font-display: block; }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      /* TODO: adjust width/height */
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #faf4ed; }

      /* === Rosé Pine Dawn palette === */
      :root {
        --bg: #faf4ed; --surface: #fffaf3; --overlay: #f2e9e1;
        --text: #575279; --muted: #797593; --subtle: #9893a5;
        --line: #cecacd;
        --foam: #56949f; --love: #b4637a; --iris: #907aa9;
        --gold: #ea9d34; --rose: #d7827e; --pine: #286983;
      }

      :root {
        --font-zh-title: 'MaShanZheng', serif;
        --font-zh-caption: 'LongCang', serif;
        --font-latin-emphasis: 'Caveat', cursive;
        --font-latin-body: 'PatrickHand', cursive;
      }

      body { font-family: var(--font-zh-title); color: var(--text); }

      .font-zh { font-family: var(--font-zh-title); font-weight: 400; }
      .font-zh-caption { font-family: var(--font-zh-caption); font-weight: 400; }
      .font-latin-emphasis { font-family: var(--font-latin-emphasis); font-weight: 700; }
      .font-latin-body { font-family: var(--font-latin-body); font-weight: 400; }
      .mixed-text .zh { font-family: var(--font-zh-title); font-weight: 400; }
      .mixed-text .latin { font-family: var(--font-latin-emphasis); font-weight: 700; }

      /* Background ambient */
      #bg-ambient { position: absolute; inset: 0; background: var(--bg); overflow: hidden; }
      #bg-ambient .grain {
        position: absolute; inset: 0; opacity: 0.18; mix-blend-mode: multiply;
        background-image:
          radial-gradient(circle at 12% 18%, rgba(86,148,159,0.05) 0, transparent 32%),
          radial-gradient(circle at 88% 78%, rgba(180,99,122,0.04) 0, transparent 35%);
      }

      /* Scene base (every scene needs class="scene clip s<N>") */
      .scene { position: absolute; inset: 0; padding: 90px 140px; }
      /* Caveat is Latin-only: keep these values English/numeric, or wrap Chinese in .zh. */
      .scene .corner-mark { position: absolute; top: 56px; left: 60px;
        font-family: var(--font-latin-emphasis); font-weight: 700; color: var(--muted); font-size: 28px; letter-spacing: 0.06em; }
      .scene .scene-num { position: absolute; top: 60px; right: 90px;
        font-family: var(--font-latin-emphasis); font-weight: 700; color: var(--muted); font-size: 38px; }

      /* TODO: per-scene CSS classes go below */
    </style>
  </head>
  <body>
    <!-- IMPORTANT: standalone composition, NO <template> wrapper, just direct div -->
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="76.6"
      data-width="1920"
      data-height="1080"
    >
      <!-- Background ambient (full duration, lowest track) -->
      <div id="bg-ambient" class="clip" data-start="0" data-duration="76.6" data-track-index="0">
        <div class="grain"></div>
        <!-- TODO: add 3-4 SVG doodles with ambient drift animation -->
      </div>

      <!-- Audio narration -->
      <audio id="narration" data-start="0" data-duration="76.6" data-track-index="9"
             src="narration.mp3" data-volume="1"></audio>

      <!-- Scenes (TODO: replace with actual scenes from scene-timing.json) -->
      <div id="s1" class="scene clip s1" data-start="0" data-duration="4.249" data-track-index="1">
        <div class="corner-mark">/ Episode 01</div>
        <div class="scene-num">01 / N</div>
        <!-- Mixed text pattern:
        <div class="mixed-text">
          <span class="zh">效率提升</span>
          <span class="latin">42%</span>
        </div>
        -->
        <!-- Replace this comment with scene-specific content in each generated project. -->
      </div>

      <!-- ... more scenes ... -->
    </div>

    <script>
      // CRITICAL: synchronous timeline construction. NO async/Promise/setTimeout.
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // === Background ambient (full-duration animations, finite repeat) ===
      // CRITICAL: use Math.floor (not ceil) for repeat count to avoid overshoot.
      // tl.to('#some-doodle', { rotation: 8, duration: 14, ease: 'sine.inOut',
      //   yoyo: true, repeat: Math.floor(76.6 / 28) - 1, transformOrigin: '50% 50%' }, 0);

      // === Helper: skip empty selectors (prevents "GSAP target not found" warnings) ===
      function enter(sel, fromVars, atTime) {
        if (gsap.utils.toArray(sel).length === 0) return;
        tl.from(sel, fromVars, atTime);
      }

      // === Per-scene entrances ===
      // RULES:
      //   - Use absolute time positions (e.g. 4.5 not "+=0.3")
      //   - Vary eases: expo.out, back.out(1.7), power3.out, sine.out — at least 3 per scene
      //   - NO exit animations (except final scene fadeout)
      //   - For numbers with units in nested <span>: animate scale/opacity, NEVER textContent
      //
      // Example:
      //   enter('#s1-eyebrow', { opacity: 0, y: -20, duration: 0.6, ease: 'power3.out' }, 0.3);
      //   enter('#s1-title',   { opacity: 0, y: 60,  duration: 0.9, ease: 'expo.out'  }, 0.5);
      //   enter('#s1-name',    { opacity: 0, scale: 0.7, duration: 0.6, ease: 'back.out(1.8)' }, 1.4);

      // === Final fadeout (only the last scene) ===
      // tl.to('#s10', { opacity: 0, duration: 0.6, ease: 'power2.in' }, 76.0);

      window.__timelines['main'] = tl;
    </script>
  </body>
</html>
